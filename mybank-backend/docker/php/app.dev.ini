; backend/docker/php/app.dev.ini — development overrides

[PHP]
display_errors         = On
display_startup_errors = On
error_reporting        = E_ALL

[xdebug]
xdebug.mode              = debug,develop
xdebug.start_with_request = yes
xdebug.client_host       = host.docker.internal
xdebug.client_port       = 9003
xdebug.log_level         = 0

[opcache]
opcache.enable          = 1
opcache.revalidate_freq = 0   ; always recheck files in dev
