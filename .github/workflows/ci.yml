name: CI MyBank

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # ÉTAPE 1 : Récupérer le code source
      - name: Checkout du code
        uses: actions/checkout@v4

      # ÉTAPE 2 : Installer Node.js avec mise en cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ÉTAPE 3 : Installer les dépendances (npm ci est plus rapide et fiable en CI)
      - name: Installation dépendances frontend
        run: npm ci

      # ÉTAPE 4 : Vérifier la qualité du code (Lint)
      # On le place souvent avant le build pour échouer plus vite si le code est "sale"
      - name: Lint ESLint
        run: npm run lint

      # ÉTAPE 5 : Exécuter les tests
      - name: Tests Vitest
        run: npm run test -- --watch=false --reporter=verbose

      # ÉTAPE 6 : Vérifier la compilation React
      - name: Build React
        run: npm run build
